name: Deploy Snowflake SQL

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0.2
        with:
          cli-version: "3.16.0"
        env:
          SNOWFLAKE_CONNECTIONS_DEFAULT_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_CONNECTIONS_DEFAULT_DATABASE: MY_DB
          SNOWFLAKE_CONNECTIONS_DEFAULT_SCHEMA: PUBLIC
          SNOWFLAKE_CONNECTIONS_DEFAULT_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}

      - name: Check Snowflake CLI
        run: snow --version

      - name: Run Snowflake SQL files
        run: |
          snow sql -f snowflake/V1__create_stage_and_file_format.sql
          snow sql -f snowflake/V2__create_curated_table.sql
          snow sql -f snowflake/V3__create_final_table.sql
          snow sql -f snowflake/V4__create_views.sql